services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: baf
      POSTGRES_PASSWORD: baf
      POSTGRES_DB: baf
    ports:
      - "5432:5432"
    volumes:
      - baf_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baf -d baf"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  baf_postgres_data:
